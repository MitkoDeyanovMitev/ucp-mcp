name: Weekly Vector Update Sync

on:
  schedule:
    - cron: '0 0 * * 0' # Midnight every Sunday
  workflow_dispatch: # Manual triggering

jobs:
  rebuild-databases:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python Dependencies
      run: pip install -r requirements.txt

    - name: Install Node Dependencies
      run: npm install

    - name: Cache Ollama Models Layer
      id: cache-ollama
      uses: actions/cache@v4
      with:
        path: ~/.ollama
        key: ollama-polyglot-models-${{ runner.os }}

    - name: Start Background Ollama Daemon
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama serve &
        sleep 5
        ollama pull nomic-embed-text
        ollama pull embeddinggemma

    - name: Rebuild Highly Concentrated Nomic Database Tables (Default)
      run: python3 src/generator/build_vector_databases.py --model nomic

    - name: Rebuild High-Fidelity Gemma Database Tables
      run: python3 src/generator/build_vector_databases.py --model gemma

    - name: Commit Persistent Data Matrices Back to Origin
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@github.com"
        
        # Ensure git tracks persistent data folders cleanly
        git add embeddings/
        
        if git diff --staged --quiet; then
          echo "No adjustments detected in generated matrices."
        else
          git commit -m "chore: automated weekly polyglot vector database synchronization [skip ci]"
          git push origin main
        fi
